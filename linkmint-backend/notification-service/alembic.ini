# Alembic config. The database URL is NOT stored here — env.py reads it from
# NOTIFY_DATABASE_URL (12-factor; no secrets in committed config).
[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# version_table lives in the service's own schema (set in env.py: version_table_schema="notify").

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
