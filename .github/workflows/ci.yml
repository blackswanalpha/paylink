# work08 — CI for the LinkMint monorepo.
# One job per component; every job reuses the component's existing Makefile / npm / pytest targets
# (no duplicated commands). Lint + unit + testcontainer integration run on every PR; the full
# docker-compose create->pay->settle e2e smoke is gated to `main` / an `e2e`-labelled PR.
#
# No secrets: the MPesa Daraja rail runs with DARAJA_STUB=true and the devnet keys are inline,
# local-only fixtures in docker-compose.yml — so this workflow needs zero `${{ secrets.* }}`.
name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x" # Dockerfiles pin golang:1.25; chain/proof-validator/mpesa need 1.25.7
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  # lVM node (Go). work08 explicitly wants `go build ./... && go test ./... -count=1`.
  chain:
    name: chain
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paylink-chain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: paylink-chain/go.sum
      - run: go vet ./... # matches paylink-chain/Makefile `lint` (vet only; gofmt left to the service Makefiles)
      - run: go build ./... && go test ./... -count=1

  # Payment lifecycle conductor (Go/chi). `make cover` = unit + testcontainers integration + 80% gate.
  payment-orchestrator:
    name: payment-orchestrator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/payment-orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/payment-orchestrator/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # ── work15 event bus (ADR-011) ──
  # Shared Go Kafka client lib. `make cover` boots a Redpanda testcontainer (integration tag).
  eventbus-go:
    name: eventbus-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/eventbus-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/eventbus-go/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # chain-event-mirror (Go). `replace`s ../eventbus-go (the full-repo checkout provides it);
  # `make cover` boots a Redpanda testcontainer for the mirror round-trip.
  chain-event-mirror:
    name: chain-event-mirror
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/chain-event-mirror
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/chain-event-mirror/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # Shared Python Kafka client lib. Default pytest is unit-only (the live round-trip is env-gated);
  # the --cov-fail-under=80 gate is met by the golden/canonicalization + fake pub/consume tests.
  eventbus-python:
    name: eventbus-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/eventbus-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/eventbus-python/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: lint + format + types
        run: ruff check . && black --check . && mypy src
      - name: test (unit, 80% gate)
        run: pytest

  # ── work18 observability (shared telemetry libs) ──
  # Shared Go OpenTelemetry helper. `make cover` runs in-process unit tests (no Docker).
  telemetry-go:
    name: telemetry-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/telemetry-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/telemetry-go/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # Shared Python OpenTelemetry helper. Unit tests (no Docker); --cov-fail-under=80 in pyproject.
  telemetry-python:
    name: telemetry-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/telemetry-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/telemetry-python/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: lint + format + types
        run: ruff check . && black --check . && mypy src
      - name: test (unit, 80% gate)
        run: pytest

  # ── work16 double-entry ledger (shared `ledger` schema) ──
  # Shared Go ledger lib. `make cover` boots a postgres:16 testcontainer (integration tag).
  ledger-go:
    name: ledger-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/ledger-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/ledger-go/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # Shared Python ledger lib. Its migration is byte-identical to ledger-go's (diff guard below);
  # pytest runs unit + a testcontainers-postgres integration suite (80% gate).
  ledger-python:
    name: ledger-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/ledger-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/ledger-python/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: ledger DDL byte-identical to ledger-go
        run: diff -q ../ledger-go/migrations/0001_init.sql src/linkmint_ledger/migrations/0001_init.sql
      - name: lint + format + types
        run: ruff check . && black --check . && mypy src
      - name: test (unit + integration, 80% gate)
        run: pytest

  # Idempotency framework (work17). Two byte-identical sibling libs: the Idempotency-Key store +
  # consumer-dedupe helpers. idempotency-go is a standalone module (no chain replace).
  idempotency-go:
    name: idempotency-go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/idempotency-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/idempotency-go/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  idempotency-python:
    name: idempotency-python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/idempotency-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/idempotency-python/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: processed_events DDL byte-identical to idempotency-go
        run: diff -q ../idempotency-go/processed_events.sql src/linkmint_idempotency/migrations/processed_events.sql
      - name: lint + format + types
        run: ruff check . && black --check . && mypy src
      - name: test (unit + integration, 80% gate)
        run: pytest

  # Audit-log service (work13, Go/chi). Standalone module (no chain `replace`). Its `make cover`
  # profiles per-package (covdata-safe) and runs the integration tag (testcontainers postgres).
  audit-log-service:
    name: audit-log-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/audit-log-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/audit-log-service/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # Escrow manager (work20, Go/chi). Module `replace`s the ../eventbus-go, ../idempotency-go,
  # and ../telemetry-go sibling libs, so it needs the full-repo checkout. Its `make cover`
  # profiles per-package (covdata-safe) and runs the integration tag (testcontainers postgres).
  escrow-manager:
    name: escrow-manager
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/escrow-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/escrow-manager/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # settlement-service (Go/chi, work23). `replace`s the eventbus/idempotency/ledger/telemetry sibling
  # libs → full-repo checkout. `make cover` profiles per-package (covdata-safe) and runs the
  # integration tag (testcontainers postgres asserts the double-entry ledger balance, A.6).
  settlement-service:
    name: settlement-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/settlement-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/settlement-service/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # Proof validator (Go/chi). Module `replace`s ../../paylink-chain, so it needs the full-repo
  # checkout. Its `make cover` profiles per-package (covdata-safe) and runs the integration tag.
  proof-validator:
    name: proof-validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/proof-validator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: linkmint-backend/proof-validator/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # MPesa adapter core (Go/chi). Also `replace`s ../../paylink-chain → full-repo checkout.
  # Its tests are unit (Daraja + validator faked); `make cover` is per-package (covdata-safe).
  mpesa-adapter:
    name: mpesa-adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/mpesa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: adapters/mpesa/go.sum
      - run: make lint
      - run: make build
      - run: make cover

  # MPesa Daraja rail SDK (Node.js). No package-lock.json → npm install, no setup-node cache.
  mpesa-daraja:
    name: mpesa-daraja
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/mpesa/daraja-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: node --test

  # PayLink service (Python/FastAPI). Full pytest = unit + testcontainers integration; the
  # --cov-fail-under=80 gate (in pyproject) is only met by the full suite.
  paylink-service:
    name: paylink-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/paylink-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/paylink-service/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # Identity service (Python/FastAPI, work09). Full pytest = unit + testcontainers integration; the
  # --cov-fail-under=80 gate (in pyproject) is only met by the full suite. OAuth runs in fake mode and
  # JWT/MFA keys auto-generate, so no secrets are needed.
  identity-service:
    name: identity-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/identity-service/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # Merchant-onboarding service (Python/FastAPI, work10). Full pytest = unit + testcontainers
  # integration; the --cov-fail-under=80 gate (in pyproject) is only met by the full suite. It is a
  # JWT consumer (verifier-only) and the bank-ref encryption key auto-generates, so no secrets needed.
  merchant-onboarding:
    name: merchant-onboarding
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/merchant-onboarding
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/merchant-onboarding/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # Admin-backoffice service (Python/FastAPI, work11). Full pytest = unit + testcontainers
  # integration; the --cov-fail-under=80 gate (in pyproject) is only met by the full suite. JWT
  # consumer (verifier-only); reads the other services over HTTP (faked/mocked in tests) — no secrets.
  admin-backoffice:
    name: admin-backoffice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/admin-backoffice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/admin-backoffice/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # Compliance-risk service (Python/FastAPI, work12). Full pytest = unit + testcontainers
  # integration; the --cov-fail-under=80 gate (in pyproject) is only met by the full suite. KYC tiers
  # + the deterministic /v1/risk/evaluate decision; JWT consumer + HMAC callbacks — no secrets.
  compliance-risk:
    name: compliance-risk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/compliance-risk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/compliance-risk/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # work14 — notification-service (Python/FastAPI + Celery/Redis). `pytest` runs unit + Celery-eager
  # integration (testcontainers Postgres/Redis); the --cov-fail-under=80 gate (pyproject) needs the
  # full suite. Console sandbox providers + inline resolver — no secrets, no live broker (eager mode).
  notification-service:
    name: notification-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/notification-service/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # work19 — invoice-subscription (Python/FastAPI). `pytest` runs unit + integration (testcontainers
  # Postgres/Redis); the --cov-fail-under=80 gate (pyproject) needs the full suite. The shared libs are
  # installed the same way as the other Python services (idempotency/telemetry eager; eventbus for the
  # kafka-mode relay/consumer the runner tests exercise).
  invoice-subscription:
    name: invoice-subscription
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/invoice-subscription
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/invoice-subscription/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: install shared eventbus lib (work15 — outbox relay / bus consumer)
        run: pip install ../eventbus-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  fee-pricing-service:
    name: fee-pricing-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/fee-pricing-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/fee-pricing-service/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: install shared eventbus lib (work15 — outbox relay / bus consumer)
        run: pip install ../eventbus-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # work22 — refund-dispute-service (Python/FastAPI). `pytest` runs unit + integration (testcontainers
  # Postgres/Redis); the --cov-fail-under=80 gate (pyproject) needs the full suite. Shared libs are
  # installed the same way as the other Python services.
  refund-dispute-service:
    name: refund-dispute-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/refund-dispute-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: linkmint-backend/refund-dispute-service/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: install shared idempotency lib (work17 — eagerly imported by the app)
        run: pip install ../idempotency-python
      - name: install shared telemetry lib (work18 — eagerly imported by the app)
        run: pip install ../telemetry-python
      - name: install shared eventbus lib (work15 — outbox relay / bus consumer)
        run: pip install ../eventbus-python
      - name: lint + format + types
        run: ruff check . && black --check . && mypy .
      - name: test (unit + integration, 80% gate)
        run: pytest

  # API gateway (Kong, DB-less declarative). No app code to unit-test — validate the config.
  api-gateway:
    name: api-gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkmint-backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: validate Kong declarative config
        run: make validate

  # JS/TS SDK (@linkmint/sdk). vitest.config.ts enforces its own 80% thresholds.
  sdk:
    name: sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdks/javascript/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # Web app (Next.js). Resolves @linkmint/sdk via file:../sdks/javascript and imports runtime
  # values from it, so the SDK dist/ must be built first. No test files / no vitest config here,
  # so there is no test step (a bare `vitest run` would error with "no test files found").
  frontend:
    name: frontend
    needs: sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            sdks/javascript/package-lock.json
            linkmint-frontend/package-lock.json
      - name: build SDK (frontend dependency)
        working-directory: sdks/javascript
        run: npm ci && npm run build
      - name: install frontend
        working-directory: linkmint-frontend
        run: npm ci
      - name: typecheck
        working-directory: linkmint-frontend
        run: npm run typecheck
      - name: lint
        working-directory: linkmint-frontend
        run: npm run lint
      - name: build
        working-directory: linkmint-frontend
        run: npm run build

  # Full-stack create->pay->settle smoke. Heavy (builds the images + boots the stack), so it is
  # gated: only on push to main, or on a PR labelled `e2e`. Reuses the existing e2e test via
  # `make e2e` (adapters/mpesa/test/e2e_settlement_test.go).
  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'e2e')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: adapters/mpesa/go.sum
      - name: boot the e2e stack
        run: docker compose --profile e2e up -d --build --wait
      - name: run create -> pay -> settle smoke
        working-directory: adapters/mpesa
        run: make e2e
      - name: dump logs on failure
        if: failure()
        run: docker compose --profile e2e logs --no-color
      - name: tear down
        if: always()
        run: docker compose --profile e2e down -v
