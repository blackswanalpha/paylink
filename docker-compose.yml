# LinkMint local stack. `docker compose up -d` boots Postgres + Redis + paylink-service.
# Add `--profile e2e` to also boot a single-validator paylink-chain devnet for live read-through.
name: linkmint

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: paylink
      POSTGRES_USER: paylink
      POSTGRES_PASSWORD: paylink
    # Not published to the host (reached over the compose network). Add a `ports:` mapping if you
    # want a host DB client to connect.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paylink -d paylink"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # work15 — Kafka-compatible event bus (Redpanda; ADR-011). Single node, KRaft (no ZooKeeper).
  # Two listeners: internal `redpanda:9092` for compose services, external `localhost:19092` for
  # host tools (rpk / the eventbus-python integration test). Topics are the 15 domain topics, created
  # by the one-shot `redpanda-init` below so producers/consumers never race auto-creation.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "19092:19092" # host access (rpk --brokers localhost:19092)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # One-shot: create the 15 domain topics (idempotent). Consumers/producers depend on this completing
  # so the topics exist deterministically (1 partition / 1 replica locally).
  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for t in paylink payment chain merchant compliance identity notification escrow settlement fee pricing fx invoice refund dispute; do
          rpk topic create "$$t" --brokers redpanda:9092 -p 1 -r 1 || true
        done
        echo "redpanda topics ready"
    restart: "no"

  # work16 — one-shot: create the shared `ledger` schema + append-only ledger_entries table and its
  # UPDATE/DELETE-reject trigger (idempotent), then exit. No service owns the ledger schema, so a
  # dedicated migrator (built from ledger-go) applies it. Services that read/write the ledger gate on
  # `ledger-migrate: condition: service_completed_successfully` (none wired yet — per-service posting
  # is work16-out-of-scope). The Python ledger lib ships a byte-identical migration for its own tests.
  ledger-migrate:
    build:
      context: ./linkmint-backend/ledger-go
    environment:
      LEDGER_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Optional Redpanda web console (topic/consumer-group inspection). Enable with `--profile tools`.
  redpanda-console:
    profiles: ["tools"]
    image: redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8099:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # Optional single-validator lVM devnet (live chain read-through). Enable with `--profile e2e`.
  # Pinned to a deterministic single-validator genesis (requiredValidations=1) and validator key so
  # the proof-validator (same key) can settle PayLinks. Use a fresh `chaindata` volume when changing
  # the genesis: `docker compose --profile e2e down -v`.
  paylink-chain:
    profiles: ["e2e"]
    build:
      context: ./paylink-chain
    command:
      - "--datadir"
      - "/data"
      - "--rpc"
      - ":8545"
      - "--genesis"
      - "/genesis/genesis.devnet.json"
      - "--privkey"
      - "b71c71a67e1177ad4e901695e1b4b9ee17ae16c6668d313eac2f96dbcda3f291"
      - "--block-interval"
      - "1000"
      # work18 — expose Prometheus metrics (linkm_*) so the observability profile's Prometheus
      # scrapes the node at paylink-chain:9090.
      - "--metrics"
      - "--metrics-addr"
      - ":9090"
    # Reached over the compose network as http://paylink-chain:8545; also published to the host on
    # 8545 so the e2e settlement test (test/e2e_settlement_test.go) can drive the chain RPC directly.
    ports:
      - "8545:8545"
    volumes:
      - chaindata:/data
      - ./linkmint-backend/proof-validator/genesis.devnet.json:/genesis/genesis.devnet.json:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          wget -qO- --header='Content-Type: application/json'
          --post-data='{"jsonrpc":"2.0","method":"paylink_chainHeight","params":{},"id":1}'
          http://localhost:8545/ || exit 1
      interval: 5s
      timeout: 3s
      retries: 20

  # work15 — chain-event-mirror. Subscribes to the lVM datastream (/ws) and republishes each chain
  # event as a chain.<kind> domain event on the bus. Needs the chain, so it rides the `e2e` profile.
  # Internal-only (no /v1, never behind the gateway). Build context is the repo root so the Dockerfile
  # can copy both this module and the eventbus-go lib it `replace`s.
  chain-event-mirror:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: linkmint-backend/chain-event-mirror/Dockerfile
    environment:
      CEM_HTTP_ADDR: ":8096"
      CEM_CHAIN_WS_URL: ws://paylink-chain:8545/ws
      KAFKA_BROKERS: redpanda:9092
      CEM_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: chain-event-mirror
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # CEM_CHAIN_EVENT_KINDS unset → mirror ALL kinds. Production narrows to settlement-relevant
      # kinds (e.g. "paylink.verified,paylink.cancelled,paylink.failed,paylink.voted,fee.collected").
    depends_on:
      paylink-chain:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8096/internal/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  paylink-service:
    build:
      context: .
      dockerfile: linkmint-backend/paylink-service/Dockerfile
    environment:
      PAYLINK_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      PAYLINK_REDIS_URL: redis://redis:6379/0
      PAYLINK_CHAIN_RPC_URL: http://paylink-chain:8545/
      PAYLINK_CHAIN_SUBMIT_ENABLED: "true"
      PAYLINK_SIGNER_MODE: service_key
      PAYLINK_LOG_LEVEL: INFO
      # work12 (Flow E): gate above-threshold creates on compliance-risk. The internal token matches
      # compliance-risk's COMPLIANCE_INTERNAL_SHARED_SECRET (dev-only fixture). The gate keys on the
      # X-User-Id (JWT `sub`) header, which the Kong gateway injects for JWT callers (anti-spoofed);
      # API-key partners carry no user identity, so their creates skip the gate by design.
      PAYLINK_COMPLIANCE_CHECK_ENABLED: "true"
      PAYLINK_COMPLIANCE_SERVICE_URL: http://compliance-risk:8093
      PAYLINK_COMPLIANCE_INTERNAL_TOKEN: devnet-internal-token
      # FE work07 — emit best-effort in-app notifications (created/verified/cancelled) to
      # notification-service's trusted intake. The token matches NOTIFY_INTERNAL_SHARED_SECRET.
      PAYLINK_NOTIFY_ENABLED: "true"
      PAYLINK_NOTIFY_SERVICE_URL: http://notification-service:8095
      PAYLINK_NOTIFY_INTERNAL_TOKEN: devnet-internal-token
      # work15 — publish domain events to the bus via the outbox-drain relay (drains paylink_events).
      PAYLINK_EVENT_PUBLISHER_MODE: kafka
      KAFKA_BROKERS: redpanda:9092
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: paylink-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      compliance-risk:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8000/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work09 — identity-service (Python/FastAPI). System of record for users/orgs/roles/API keys/MFA
  # and the RS256 JWT issuer the api-gateway verifies. Shares the Postgres instance (owns the
  # `identity` schema) + Redis. OAuth runs in fake/stub mode locally (no external creds). The MFA key
  # is omitted (ephemeral dev key at startup); the JWT public key is served at
  # /v1/auth/.well-known/jwks.json. Default profile — no chain dependency.
  #
  # NOTE: IDENTITY_JWT_PRIVATE_KEY_PEM below pins a FIXED dev RSA-2048 keypair shared with
  # merchant-onboarding (which sets the matching MERCHANT_JWT_PUBLIC_KEY_PEM), so a token minted here
  # verifies in merchant-onboarding end-to-end (work10). This is a dev-only fixture — like the inline
  # devnet chain keys in this file — NOT a real secret; prod injects the key via env/KMS and a live
  # JWKS fetch replaces this static pinning (tracked follow-up).
  identity-service:
    build:
      context: .
      dockerfile: linkmint-backend/identity-service/Dockerfile
    environment:
      IDENTITY_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      IDENTITY_REDIS_URL: redis://redis:6379/0
      IDENTITY_JWT_ISSUER: linkmint-identity
      IDENTITY_JWT_AUDIENCE: linkmint
      IDENTITY_OAUTH_FAKE: "true"
      IDENTITY_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: identity-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only fixed RSA-2048 signing key (see note above) — shared with merchant-onboarding.
      IDENTITY_JWT_PRIVATE_KEY_PEM: |-
        -----BEGIN PRIVATE KEY-----
        MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQDggKygx8OWkUbF
        8oOTBo4JKJwTfWEa7NUnnFLF8HVhuXbIGDmlUyw5n9aDnGtbQeLCLdSzsZYmjCkt
        ILGLPDt2CaStKYptVT3P+raeclxvSABYIqt4FDQBZLUreidRdXYAKSnZ+ZGS2l1N
        T1kSQKZ1dx6BYQ0Ezixov5SEU4e7T9TzkiaGWpHHD5xxfC6r1XQajBZiNUaBQHQU
        7B3bAphd2B2KsdlDjDszAnjPIXc//yDf72Zy5ZFwtzc6fHuDaHshxSnSvD2mE7H/
        xuwah3AVbHfLe6VMauIVzv3qVBv/u3w9mlg41QuM/Dq0AEpUELb2Gbi6HUzYBvfp
        QWuNnJUNAgMBAAECggEAAKFYoPkv+Z/2voSsqzEXrtUii7+oHFYTkb+tZVcKQTrC
        BmNxWAhs3cx3qMBcIP3xX8V2eLw5kIvwJVg/8TBjC4IivQGnpnvurv6mK9tLmqX+
        ZnXoXUwfUIGs6iC+PZ+yaZbbuAKl77r+a13ImaXn3gyPWfQBk1Agzh207YFtXbv/
        mxyZ01aXQwFT52/+Be7tkBjnUzOx+18G5AJgZBk3gTboTyiBgEl95ujJobU38UpP
        nyAVN9tuIKZwmUCEjzrPylmdCjGD2Knp0f7cakgm3nseEAqOC/CD3NK2I+QA1ED7
