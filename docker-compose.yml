        mF2q0q/0w4GdGbtpJwrMLsmHiTV6jih9PcWlLHXRAoGAMF4l3bgVvnvt6Dmnd6ZR
        +EKz7OaS49hVGHN7OwYebQ22xA7Il98jIyD7yq+dypayDykA9jU/uTaKwJAAPjof
        kFQvde9z1WthbrdplR6861qOOADqTybqSlH8HaXMizQq5OjOWNUprzFDKVtjmx1P
        7tagy8Jv73cS1BPGRz2JOnQ=
        -----END PRIVATE KEY-----
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8090/internal/readyz').status==200 else 1)"
