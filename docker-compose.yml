      timeout: 5s
      retries: 10
      start_period: 25s

  # work10 — merchant-onboarding (Python/FastAPI). Owns the merchant lifecycle (business
  # verification, document upload, bank-account linking + verification, contract acceptance,
  # fee-tier assignment) and the DRAFT→PENDING_VERIFICATION→ACTIVE state machine. Shares the
  # Postgres instance (owns the `merchant` schema) + Redis. It is a JWT *consumer* (verifier-only):
  # MERCHANT_JWT_PUBLIC_KEY_PEM below is the public half of the FIXED dev keypair whose private half
  # is pinned on identity-service above, so a token minted by identity verifies here end-to-end.
  # Dev-only fixture (NOT a real secret); live JWKS fetch is a follow-up. Documents use the local
  # filesystem object store; the bank-ref encryption key is omitted (ephemeral dev key at startup).
  # Default profile — no chain dependency.
  merchant-onboarding:
    build:
      context: .
      dockerfile: linkmint-backend/merchant-onboarding/Dockerfile
    environment:
      MERCHANT_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      MERCHANT_REDIS_URL: redis://redis:6379/0
      MERCHANT_JWT_ISSUER: linkmint-identity
      MERCHANT_JWT_AUDIENCE: linkmint
      MERCHANT_OBJECT_STORE_MODE: local
      MERCHANT_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: merchant-onboarding
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only public key matching identity-service's pinned private key (see note above).
      MERCHANT_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8091/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work11 — admin-backoffice (Python/FastAPI). Internal, read-only ops console (Phase 1): unified
  # search + entity drill-down views across users/merchants/PayLinks/payments, gated by admin JWT +
  # MFA + default-deny scopes, every access audited. Owns the thin `admin` schema (staff scope
  # grants + the Phase-2 flag/announcement tables) and reads every entity through the other
  # services' admin/internal HTTP endpoints (no cross-schema DB reads). JWT *consumer*
  # (verifier-only): ADMIN_JWT_PUBLIC_KEY_PEM is the public half of the FIXED dev keypair pinned on
  # identity-service, so an identity-minted MFA token verifies here. Authorization is default-deny —
  # grant staff via admin.staff (prod) or ADMIN_DEV_STAFF_GRANTS=<sub>:superuser (dev). It boots
  # without the upstreams (search degrades gracefully), so it depends only on Postgres + Redis.
  # Default profile — no chain dependency.
  admin-backoffice:
    build:
      # work18 — repo-root context so the Dockerfile can COPY the shared telemetry-python lib.
      context: .
      dockerfile: linkmint-backend/admin-backoffice/Dockerfile
    environment:
      ADMIN_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      ADMIN_REDIS_URL: redis://redis:6379/0
      ADMIN_JWT_ISSUER: linkmint-identity
      ADMIN_JWT_AUDIENCE: linkmint
      ADMIN_LOG_LEVEL: INFO
      # work13 — emit every privileged access to audit-log-service (best-effort, bounded-timeout).
      ADMIN_AUDIT_SINK_MODE: http
      ADMIN_AUDIT_LOG_URL: http://audit-log-service:8094
      ADMIN_AUDIT_INTERNAL_TOKEN: devnet-internal-token
      ADMIN_IDENTITY_SERVICE_URL: http://identity-service:8090
      ADMIN_MERCHANT_SERVICE_URL: http://merchant-onboarding:8091
      ADMIN_PAYLINK_SERVICE_URL: http://paylink-service:8000
      ADMIN_PAYMENT_ORCHESTRATOR_URL: http://payment-orchestrator:8080
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: admin-backoffice
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Default-deny: empty = no one is staff until granted in admin.staff. For a quick local demo,
      # set "<your-jwt-sub>:superuser" (dev-only convenience; NOT a real secret).
      ADMIN_DEV_STAFF_GRANTS: ""
      # Dev-only public key matching identity-service's pinned private key (see identity note above).
      ADMIN_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Ordering only — the http audit sink is best-effort, so admin never hard-blocks on audit.
      audit-log-service:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8092/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work12 — compliance-risk (Python/FastAPI). KYC tier orchestration + the deterministic
  # /v1/risk/evaluate decision (allow/block/review) over KYC tier / velocity / amount-vs-tier-ceiling
  # / geo + the Kenya AML threshold (KES 150k cumulative). Owns the `compliance` schema; publishes
  # compliance.kyc.*/compliance.check.*/compliance.flag.raised via the LogPublisher seam. JWT
  # *consumer* (verifier-only): COMPLIANCE_JWT_PUBLIC_KEY_PEM is the public half of the FIXED dev
  # keypair pinned on identity-service, so an identity-minted token verifies here. /v1/risk/evaluate is
  # internal (trusted-network); COMPLIANCE_INTERNAL_SHARED_SECRET adds an optional X-Internal-Token
  # check (paylink-service sends the matching PAYLINK_COMPLIANCE_INTERNAL_TOKEN). KYC callbacks are
  # HMAC-signed (COMPLIANCE_CALLBACK_SECRETS, per-provider). Default profile — no chain dependency.
  compliance-risk:
    build:
      context: .
      dockerfile: linkmint-backend/compliance-risk/Dockerfile
    environment:
      COMPLIANCE_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      COMPLIANCE_REDIS_URL: redis://redis:6379/0
      COMPLIANCE_JWT_ISSUER: linkmint-identity
      COMPLIANCE_JWT_AUDIENCE: linkmint
      COMPLIANCE_LOG_LEVEL: INFO
      COMPLIANCE_EVENT_PUBLISHER_MODE: log
      COMPLIANCE_KYC_PROVIDER: stub
      # Per-provider HMAC secret for /v1/kyc/callbacks/{provider} (dev-only fixture, NOT a real secret).
      COMPLIANCE_CALLBACK_SECRETS: "stub:devnet-callback-secret"
      # Optional defense-in-depth on internal /v1/risk/evaluate (matches paylink's token below).
      COMPLIANCE_INTERNAL_SHARED_SECRET: devnet-internal-token
      COMPLIANCE_AML_CUMULATIVE_THRESHOLD: "150000"
      COMPLIANCE_AML_WINDOW_HOURS: "720"
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: compliance-risk
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only public key matching identity-service's pinned private key (see identity note above).
      COMPLIANCE_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8093:8093"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8093/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work13 — audit-log-service (Go/chi). Append-only, tamper-evident hash chain that is the system
  # of record for "who did what when" (entry_hash = SHA256(prev_hash || canonical_json(entry))).
  # POST /v1/audit-log is internal intake (X-Internal-Token, ADR-009 mTLS stand-in — admin-backoffice
  # sends the matching ADMIN_AUDIT_INTERNAL_TOKEN); the GET reads verify an identity RS256 token in
  # service (AUDIT_JWT_PUBLIC_KEY_PEM is the public half of the FIXED dev keypair pinned on
  # identity-service) and require an admin/compliance role. The NATS audit.intake consumer is a
  # work15 seam (disabled). Owns the `audit` schema. Default profile — no chain dependency.
  audit-log-service:
    build:
      context: .
      dockerfile: linkmint-backend/audit-log-service/Dockerfile
    environment:
      AUDIT_HTTP_ADDR: ":8094"
      AUDIT_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
      AUDIT_REDIS_URL: redis://redis:6379/0
      # Intake gate (ADR-009). admin-backoffice sends the matching token on every emit.
      AUDIT_INTERNAL_SHARED_SECRET: devnet-internal-token
      AUDIT_JWT_ISSUER: linkmint-identity
      AUDIT_JWT_AUDIENCE: linkmint
      AUDIT_READER_ROLES: "admin,compliance"
      AUDIT_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: audit-log-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only public key matching identity-service's pinned private key (see identity note above).
      AUDIT_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8094:8094"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8094/internal/healthz || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # work14 — notification-service (Python/FastAPI + Celery/Redis). Multi-channel delivery (SMS/email
  # via sandbox console providers) of domain events: template render → durable delivery log → retry
  # with exponential backoff (30s/2m/10m/1h/6h, max 5). POST /v1/notifications is the work15 bus
  # stand-in (X-Internal-Token, ADR-009); the GET reads a delivery (recipient masked). Owns the
  # `notify` schema. Webhooks/push are Phase 2. The Celery broker is a DEDICATED Redis DB (/1) so it
  # never collides with the idempotency cache (/0). The web container runs migrations on start.
  notification-service:
    build:
      context: .
      dockerfile: linkmint-backend/notification-service/Dockerfile
    environment:
      NOTIFY_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      NOTIFY_REDIS_URL: redis://redis:6379/0
      NOTIFY_CELERY_BROKER_URL: redis://redis:6379/1
      NOTIFY_SMS_PROVIDER: console
      NOTIFY_EMAIL_PROVIDER: console
      NOTIFY_RECIPIENT_RESOLVER: inline
      # Intake gate (ADR-009). Trusted callers / the future work15 bus subscriber send this token.
      NOTIFY_INTERNAL_SHARED_SECRET: devnet-internal-token
      NOTIFY_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # work15 — consume domain events from the bus (paylink.verified, payment.failed) via a lifespan
      # bus-consumer task feeding the same NotificationEventConsumer.handle as the HTTP intake.
      NOTIFY_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8095:8095"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8095/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work14 — notification-worker: the Celery worker (SAME image) that runs deliveries + backoff
  # retries. Waits for notification-service to be healthy (it applies the migrations) before consuming
  # the `notify` queue from the Redis broker (DB /1).
  notification-worker:
    build:
      context: .
      dockerfile: linkmint-backend/notification-service/Dockerfile
    entrypoint: ["./worker-entrypoint.sh"]
    # The worker has no HTTP surface — replace the image's inherited web healthcheck with a Celery
    # worker ping (over the Redis broker) so `up --wait` can gate on it.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "celery -A app.celeryapp.app:celery_app inspect ping -d celery@$$(hostname) >/dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      # The worker uses the DB + the Celery broker only (no idempotency cache → no NOTIFY_REDIS_URL).
      NOTIFY_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      NOTIFY_CELERY_BROKER_URL: redis://redis:6379/1
      NOTIFY_SMS_PROVIDER: console
      NOTIFY_EMAIL_PROVIDER: console
      NOTIFY_RECIPIENT_RESOLVER: inline
      NOTIFY_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: notification-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  # work19 — invoice-subscription (Python/FastAPI). Multi-line invoices that aggregate into a single
  # backing PayLink (DRAFT→OPEN→PAID|VOID|OVERDUE). On finalize it calls paylink-service to mint the
  # PayLink; settlement truth comes from the chain — the work15 bus consumer marks an invoice PAID on
  # chain.paylink.verified (published by chain-event-mirror). Publishes invoice.* via the outbox relay
  # (EVENT_PUBLISHER_MODE=kafka). A lifespan sweeper flips OPEN→OVERDUE past due_at. JWT *consumer*
  # (verifier-only): INVOICE_JWT_PUBLIC_KEY_PEM is the public half of the FIXED dev keypair pinned on
  # identity-service. Owns the `invoice` schema. Subscriptions are deferred to work31. Default profile.
  invoice-subscription:
    build:
      context: .
      dockerfile: linkmint-backend/invoice-subscription/Dockerfile
    environment:
      INVOICE_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      INVOICE_REDIS_URL: redis://redis:6379/0
      INVOICE_JWT_ISSUER: linkmint-identity
      INVOICE_JWT_AUDIENCE: linkmint
      INVOICE_LOG_LEVEL: INFO
      # work01 — the aggregated PayLink is minted here on finalize.
      INVOICE_PAYLINK_SERVICE_URL: http://paylink-service:8000
      # work15 — publish invoice.* via the outbox relay; consume chain.paylink.verified → mark PAID.
      INVOICE_EVENT_PUBLISHER_MODE: kafka
      INVOICE_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      INVOICE_OVERDUE_SWEEP_ENABLED: "true"
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: invoice-subscription
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only public key matching identity-service's pinned private key (see identity note above).
      INVOICE_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8096:8096"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      paylink-service:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8096/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work21 — fee-pricing-service (Python/FastAPI). The single source of "what does this payment
  # cost": per-merchant tier pricing, per-rail fee schedules, FX quoting (rates locked at quote time
  # for audit), and monthly platform-fee invoicing. Owns the `pricing` schema. JWT *consumer*
  # (verifier-only): PRICING_JWT_PUBLIC_KEY_PEM is the public half of the FIXED dev keypair pinned on
  # identity-service. Consumes merchant.onboarded / merchant.fee_tier.changed (merchant topic);
  # publishes pricing.fee_quote.issued / fx.rate.updated / invoice.platform_fee.issued via the outbox
  # relay (these route to the pricing/fx/invoice topics per topic_for — see catalog.md). A lifespan
  # sweeper generates monthly platform-fee invoices. The platform fee here is DISTINCT from the
  # on-chain 0.5% PLN inflation fee (rules.md A.5). Default profile — no chain dependency.
  fee-pricing-service:
    build:
      context: .
      dockerfile: linkmint-backend/fee-pricing-service/Dockerfile
    environment:
      PRICING_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      PRICING_REDIS_URL: redis://redis:6379/0
      PRICING_JWT_ISSUER: linkmint-identity
      PRICING_JWT_AUDIENCE: linkmint
      PRICING_LOG_LEVEL: INFO
      # work15 — publish pricing.*/fx.*/invoice.* via the outbox relay; consume merchant.* to keep
      # the local merchant_pricing tier cache in sync.
      PRICING_EVENT_PUBLISHER_MODE: kafka
      PRICING_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      # FX: deterministic static rates locally (no external provider); 60s Redis cache.
      PRICING_FX_PROVIDER: static
      PRICING_FX_CACHE_TTL_SECONDS: "60"
      PRICING_FX_STATIC_RATES: "USD:KES=129.50,EUR:KES=140.00,KES:KES=1"
      # Monthly platform-fee invoice sweeper (idempotent per merchant+period).
      PRICING_INVOICE_SWEEP_ENABLED: "true"
      PRICING_INVOICE_SWEEP_INTERVAL_SECONDS: "3600"
      # Trusted-network gate for /v1/internal/* (ADR-009). Trusted callers send the matching token.
      PRICING_INTERNAL_SHARED_SECRET: devnet-internal-token
      # A.6 ledger-posting seam OFF (per-service posting deferred in work16).
      PRICING_LEDGER_POSTING_ENABLED: "false"
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: fee-pricing-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only public key matching identity-service's pinned private key (see identity note above).
      PRICING_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8097:8097"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8097/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work22 — refund-dispute-service (Python/FastAPI). Refunds (REQUESTED→PROCESSING→COMPLETED, full +
  # partial) and rail-initiated disputes/chargebacks (HMAC webhook intake → evidence window → submit
  # → WON/LOST/EXPIRED). Strictly non-custodial (A.1): the rail reversal is instruction-only (no rail
  # adapter supports reversal yet) and a lost/expired dispute publishes refund.clawback.requested for
  # settlement (work23) to consume — never moves funds. Owns the `refund` schema. Consumes
  # chain.paylink.verified (the original-amount projection, A.3); publishes refund.* / dispute.* via
  # the outbox relay. A sweeper expires overdue disputes and (dev) simulates refund completion.
  refund-dispute-service:
    build:
      context: .
      dockerfile: linkmint-backend/refund-dispute-service/Dockerfile
    environment:
      REFUND_DATABASE_URL: postgresql+psycopg://paylink:paylink@postgres:5432/paylink
      REFUND_REDIS_URL: redis://redis:6379/0
      REFUND_JWT_ISSUER: linkmint-identity
      REFUND_JWT_AUDIENCE: linkmint
      REFUND_LOG_LEVEL: INFO
      # work15 — publish refund.*/dispute.* via the outbox relay; consume chain.paylink.verified to
      # project verified_paylinks (the original-amount source of truth, A.3).
      REFUND_EVENT_PUBLISHER_MODE: kafka
      REFUND_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      # Upstream lookups: refund eligibility (orchestrator) + original-amount fallback (paylink-svc).
      REFUND_PAYMENT_ORCHESTRATOR_URL: http://payment-orchestrator:8080
      REFUND_PAYLINK_SERVICE_URL: http://paylink-service:8000
      # Dev runs lenient (the verified_paylinks projection only fills under --profile e2e); prod runs
      # strict. Merchant approval is the authorization gate when the original amount is unresolvable.
      REFUND_AMOUNT_VALIDATION: lenient
      # Rail reversal is instruction-only; the sweeper simulates PROCESSING→COMPLETED in dev.
      REFUND_REVERSAL_SIMULATE: "true"
      REFUND_SWEEP_ENABLED: "true"
      REFUND_SWEEP_INTERVAL_SECONDS: "30"
      # Per-provider dispute-webhook HMAC secrets ("<provider>:secret;...").
      REFUND_WEBHOOK_SECRETS: "stub:devnet-dispute-secret"
      # Clawback is a published contract for settlement (work23); A.6 ledger posting OFF (work23 writes).
      REFUND_CLAWBACK_MODE: event
      REFUND_LEDGER_POSTING_ENABLED: "false"
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: refund-dispute-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Dev-only public key matching identity-service's pinned private key (see identity note above).
      REFUND_JWT_PUBLIC_KEY_PEM: |-
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA4ICsoMfDlpFGxfKDkwaO
        CSicE31hGuzVJ5xSxfB1Ybl2yBg5pVMsOZ/Wg5xrW0Hiwi3Us7GWJowpLSCxizw7
        dgmkrSmKbVU9z/q2nnJcb0gAWCKreBQ0AWS1K3onUXV2ACkp2fmRktpdTU9ZEkCm
        dXcegWENBM4saL+UhFOHu0/U85ImhlqRxw+ccXwuq9V0GowWYjVGgUB0FOwd2wKY
        XdgdirHZQ4w7MwJ4zyF3P/8g3+9mcuWRcLc3Onx7g2h7IcUp0rw9phOx/8bsGodw
        FWx3y3ulTGriFc796lQb/7t8PZpYONULjPw6tABKVBC29hm4uh1M2Ab36UFrjZyV
        DQIDAQAB
        -----END PUBLIC KEY-----
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      payment-orchestrator:
        condition: service_started
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://localhost:8100/internal/readyz').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # work20 — escrow-manager (Go/chi). Conditional PayLink release/refund: holds the release
  # DECISION until a condition is met (delivery confirmation, time-lock, N-of-M approval), then
  # publishes an escrow.released/escrow.refunded INSTRUCTION — strictly non-custodial (A.1), no
  # funds and no chain-write client. Owns the `escrow` schema. Consumes chain.paylink.verified
  # from the bus (group escrow-manager) to mark escrows funded — DbDedupe on
  # escrow.processed_events makes redeliveries exactly-once in effect (work17). A sweeper
  # releases due funded time_locks and refunds timeouts. Default profile (the chain devnet is
  # not required; funding events simply don't flow until `--profile e2e` runs the mirror).
  escrow-manager:
    build:
      context: .
      dockerfile: linkmint-backend/escrow-manager/Dockerfile
    environment:
      ESCROW_HTTP_ADDR: ":8098"
      ESCROW_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
      ESCROW_REDIS_URL: redis://redis:6379/0
      ESCROW_LOG_LEVEL: INFO
      # work15 — publish escrow.* to the bus; consume chain.paylink.verified (funding truth, A.3).
      ESCROW_EVENT_PUBLISHER_MODE: kafka
      ESCROW_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      ESCROW_SWEEP_ENABLED: "true"
      ESCROW_SWEEP_INTERVAL_SECONDS: "10"
      ESCROW_DEFAULT_TIMEOUT_SECONDS: "86400"
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: escrow-manager
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8098:8098"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8098/internal/healthz || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # work23 — settlement-service (Go/chi). Off-chain settlement lifecycle: aggregates verified
  # PayLinks into per-merchant settlements (gross/fee/net), schedules T+1 payouts, and ingests rail
  # settlement files. Strictly non-custodial (A.1): a payout is an INSTRUCTION over the merchant's
  # rail, never a fund movement. Owns the `settlement` schema and runs the shared `ledger` migrations
  # (work16) — every flow is a balanced double-entry posting (A.6). Consumes chain.paylink.verified
  # + chain.fee.collected (gross + chain fee, A.5), merchant.* (routing projections), and
  # refund.clawback.requested (negative offsets); publishes settlement.*/payout.*. DbDedupe on
  # settlement.processed_events makes redeliveries exactly-once (work17). The payout scheduler closes
  # due settlements and instructs payouts; the rail-file ingest endpoint (:8101/settlements/files/
  # ingest) is internal/trusted-network only (NOT routed through the gateway).
  settlement-service:
    build:
      context: .
      dockerfile: linkmint-backend/settlement-service/Dockerfile
    environment:
      SETTLEMENT_HTTP_ADDR: ":8101"
      SETTLEMENT_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
      SETTLEMENT_REDIS_URL: redis://redis:6379/0
      SETTLEMENT_LOG_LEVEL: INFO
      # work15 — publish settlement.*/payout.* to the bus; consume chain/merchant/refund topics.
      SETTLEMENT_EVENT_PUBLISHER_MODE: kafka
      SETTLEMENT_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      # Payout scheduler: close due settlements (T+1 cutoff) and instruct payouts.
      SETTLEMENT_SCHEDULE_ENABLED: "true"
      SETTLEMENT_SCHEDULE_INTERVAL_SECONDS: "30"
      SETTLEMENT_CURRENCY: KES
      SETTLEMENT_DEFAULT_TZ: Africa/Nairobi
      SETTLEMENT_DEFAULT_RAIL: mpesa
      SETTLEMENT_MIN_PAYOUT: "KES:10000"
      SETTLEMENT_PLATFORM_FEE_BPS: "0"
      # Internal rail-file ingest token (trusted-network only; mTLS terminates upstream).
      SETTLEMENT_INGEST_TOKEN: ${SETTLEMENT_INGEST_TOKEN:-devnet-settlement-ingest}
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: settlement-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8101:8101"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8101/internal/healthz || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # work24 — wallet-service (Go/chi). Read-side over on-chain PLN: balances (read-through RPC cache),
  # transaction history / staking positions/rewards / treasury stats (chain.* event projections), and
  # UNSIGNED staking intents (A.1 — never holds keys). The chain devnet is `--profile e2e` only;
  # without it readyz stays green (projections + cached balances still serve) and the chain dep shows
  # degraded. No redis (no HTTP idempotency store) and no ledger (records no money flows).
  wallet-service:
    build:
      context: .
      dockerfile: linkmint-backend/wallet-service/Dockerfile
    environment:
      WALLET_HTTP_ADDR: ":8102"
      WALLET_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
      WALLET_LOG_LEVEL: INFO
      WALLET_CHAIN_RPC_URL: http://paylink-chain:8545/
      WALLET_CHAIN_ID: paylink-devnet
      # work15 — index the `chain` topic into the wallet read-side.
      WALLET_EVENT_CONSUMER_ENABLED: "true"
      KAFKA_BROKERS: redpanda:9092
      WALLET_BALANCE_CACHE_TTL_SECONDS: "5"
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: wallet-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8102:8102"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8102/internal/healthz || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # work02 — payment lifecycle conductor (Go/chi). Reacts to lVM chain events and reconciles
  # against on-chain truth (read-through RPC + WS). The chain devnet is `--profile e2e` only;
  # without it readyz reports the chain dep down (liveness/healthz stays up). With `--profile e2e`
  # the node is reachable and the WS subscriber advances lifecycle on settle/cancel/fail.
  payment-orchestrator:
    build:
      context: .
      dockerfile: linkmint-backend/payment-orchestrator/Dockerfile
    environment:
      PAYMENT_HTTP_ADDR: ":8080"
      PAYMENT_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
      PAYMENT_REDIS_URL: redis://redis:6379/0
      PAYMENT_CHAIN_RPC_URL: http://paylink-chain:8545/
      PAYMENT_CHAIN_WS_URL: ws://paylink-chain:8545/ws
      PAYMENT_PAYLINK_SERVICE_URL: http://paylink-service:8000
      PAYMENT_CHAIN_EVENTS_ENABLED: "true"
      # work04 — registered MPesa rail adapter (config-only registry; logged at boot, not called).
      PAYMENT_ADAPTER_MPESA_URL: http://mpesa-adapter:8082
      PAYMENT_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: payment-orchestrator
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # work16 — the settlement hub is the natural ledger writer, so gate it on the one-shot ledger
      # schema migration. This also gives ledger-migrate a `service_completed_successfully` dependent
      # so `docker compose up --wait` treats its exit 0 as an expected completion (without a dependent,
      # --wait reports `container ledger-migrate exited (0)` and the e2e boot step fails).
      ledger-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8080/internal/healthz || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # work05 — api-gateway (Kong DB-less declarative; ADR-008). The single authenticated ingress:
  # routes /v1/paylinks* → paylink-service and /v1/payments* → payment-orchestrator; validates JWT
  # (dev HS256 here; RS256 + identity-service when work09 lands) + partner API keys, rejecting with
  # the standard error envelope; injects a trustworthy X-Creator-Addr and strips any client-supplied
  # one (ADR-006 anti-spoofing); Redis-backed rate limit; X-Request-Id propagation. Default profile
  # — the front door of the local stack on :8088 (Kong admin stays bound to localhost, not exposed).
  api-gateway:
    build:
      context: ./linkmint-backend/api-gateway
    environment:
      GATEWAY_PAYLINK_SERVICE_URL: http://paylink-service:8000
      GATEWAY_PAYMENT_ORCHESTRATOR_URL: http://payment-orchestrator:8080
      # FE work07 — route /v1/notifications* to the in-app inbox (auth required; X-Creator-Addr injected).
      GATEWAY_NOTIFICATION_SERVICE_URL: http://notification-service:8095
      # work08 (FE SDK expansion) — additive PASS-THROUGH routes for the identity-family services.
      # These verify the identity-issued RS256 token themselves; the gateway forwards Authorization
      # untouched and injects NO X-Creator-Addr (the kong.yml.tmpl routes carry no jwt/key-auth plugin).
      GATEWAY_IDENTITY_SERVICE_URL: http://identity-service:8090
      GATEWAY_MERCHANT_SERVICE_URL: http://merchant-onboarding:8091
      GATEWAY_COMPLIANCE_SERVICE_URL: http://compliance-risk:8093
      GATEWAY_ADMIN_SERVICE_URL: http://admin-backoffice:8092
      GATEWAY_AUDIT_SERVICE_URL: http://audit-log-service:8094
      # work21 — additive pass-through upstream (fee-pricing; RS256 self-verify, no X-Creator-Addr).
      GATEWAY_FEE_PRICING_SERVICE_URL: http://fee-pricing-service:8097
      # work22 — additive pass-through upstream (refund-dispute; RS256 self-verify + HMAC webhook).
      GATEWAY_REFUND_DISPUTE_SERVICE_URL: http://refund-dispute-service:8100
      # work20 — escrow-manager (auth required; X-Creator-Addr injected like paylinks/payments).
      GATEWAY_ESCROW_SERVICE_URL: http://escrow-manager:8098
      # work23 — settlement-service (auth required; X-Creator-Addr injected = merchant settlement key).
      # The /settlements/files/ingest endpoint is internal-only and intentionally NOT routed here.
      GATEWAY_SETTLEMENT_SERVICE_URL: http://settlement-service:8101
      # work24 — wallet-service: /v1/wallets + /v1/staking are auth+self-scoped (X-Creator-Addr
      # injected); /v1/treasury is public pass-through (no auth).
      GATEWAY_WALLET_SERVICE_URL: http://wallet-service:8102
      GATEWAY_REDIS_HOST: redis
      GATEWAY_REDIS_PORT: "6379"
      GATEWAY_JWT_ISSUER: linkmint-dev
      # Dev HS256 secret — LOCAL ONLY. Prod: GATEWAY_JWT_ALGORITHM=RS256 + the identity-service key.
      GATEWAY_JWT_DEV_SECRET: devsecret-change-me
      GATEWAY_JWT_CREATOR_ADDR_CLAIM: creator_addr
      # work09 RS256 seam (additive, non-breaking): to validate identity-service's RS256 tokens at
      # the gateway, uncomment the `identity-rs256` consumer in kong/kong.yml.tmpl and set these to
      # identity's issuer + public key (served at identity's /v1/auth/.well-known/jwks.json). The
      # HS256 dev path above stays intact (the `jwt` plugin selects the credential by the `iss`
      # claim). Left inactive locally because identity generates an ephemeral keypair at startup;
      # provisioning a static key / dynamic JWKS fetch is a tracked follow-up.
      # GATEWAY_JWT_RS256_ISSUER: linkmint-identity
      # GATEWAY_JWT_RS256_PUBLIC_KEY: ""
      GATEWAY_PARTNER_API_KEY: devpartnerkey-change-me
      GATEWAY_PARTNER_CREATOR_ADDR: "0x00000000000000000000000000000000000000bb"
      GATEWAY_RATE_LIMIT_PER_MINUTE: "100"
      KONG_LOG_LEVEL: notice
    ports:
      # Only the proxy is published to the host. The status/metrics listener (:8100) and the admin
      # API (127.0.0.1:8001) stay on the compose network — Prometheus (work18) scrapes :8100 there.
      - "8088:8088"
    depends_on:
      redis:
        condition: service_healthy
      paylink-service:
        condition: service_healthy
      payment-orchestrator:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      # work08 — additive pass-through upstreams (all default-profile, with healthchecks).
      identity-service:
        condition: service_healthy
      merchant-onboarding:
        condition: service_healthy
      compliance-risk:
        condition: service_healthy
      admin-backoffice:
        condition: service_healthy
      audit-log-service:
        condition: service_healthy
      fee-pricing-service:
        condition: service_healthy
      refund-dispute-service:
        condition: service_healthy
      escrow-manager:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # work03 — proof-validator (Go/chi). Verifies a signed rail-agnostic proof and broadcasts a
  # TxSubmitValidation settlement tx to the lVM. It cannot function without the chain, so it is
  # `--profile e2e` only. The build context is the repo root because its module replaces
  # github.com/paylink/paylink-chain with ../../paylink-chain (reused byte-exact via pkg/lvm).
  # It signs with the same validator key the chain runs with, and devnet auto-stake makes it the
  # single active validator (requiredValidations=1) so it can settle.
  proof-validator:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: linkmint-backend/proof-validator/Dockerfile
    environment:
      PROOF_VALIDATOR_HTTP_ADDR: ":8081"
      PROOF_VALIDATOR_DATABASE_URL: postgres://paylink:paylink@postgres:5432/paylink?sslmode=disable
      PROOF_VALIDATOR_REDIS_URL: redis://redis:6379/0
      PROOF_VALIDATOR_CHAIN_RPC_URL: http://paylink-chain:8545/
      PROOF_VALIDATOR_SIGNER_MODE: service_key
      PROOF_VALIDATOR_CHAIN_SIGNER_KEY: b71c71a67e1177ad4e901695e1b4b9ee17ae16c6668d313eac2f96dbcda3f291
      PROOF_VALIDATOR_TRUSTED_PUBKEYS: 04e63cbe3984eae5834516e4af2e8e7fa88ce497f68bdcacf95a8fdaf9db4b02efa0ebcb964a1a74ec3d8c748b1e32986788f6c9a4aac39f0b79ac359801a5317d
      PROOF_VALIDATOR_PAYLINK_CROSSCHECK: "true"
      PROOF_VALIDATOR_AUTO_STAKE: "true"
      PROOF_VALIDATOR_LOG_LEVEL: INFO
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: proof-validator
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      paylink-chain:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/internal/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # work04 — MPesa adapter, Node.js Daraja rail SDK (ADR-007). Speaks Daraja (OAuth + STK push + raw
  # callback parsing) and forwards rail-neutral fields to the Go core. DARAJA_STUB=true so the devnet
  # e2e flow needs no Safaricom credentials. `--profile e2e` (end-to-end settlement needs chain +
  # validator). Reached over the compose network as http://mpesa-daraja:8083; published for the e2e
  # test (which POSTs a Daraja callback directly).
  mpesa-daraja:
    profiles: ["e2e"]
    build:
      context: ./adapters/mpesa/daraja-service
    environment:
      DARAJA_SERVICE_PORT: "8083"
      DARAJA_STUB: "true"
      DARAJA_SANDBOX: "true"
      DARAJA_CALLBACK_URL: http://mpesa-daraja:8083/daraja/callback?t=devnet-callback-token
      DARAJA_CALLBACK_TOKEN: devnet-callback-token
      ADAPTER_CORE_URL: http://mpesa-adapter:8082
      MPESA_ADAPTER_INTERNAL_TOKEN: devnet-internal-token
      DARAJA_LOG_LEVEL: info
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # work04 — MPesa adapter CORE (Go/chi). Normalizes a rail-neutral callback to the proof, signs it
  # byte-exact via pkg/lvm, and broadcasts a settlement to the proof-validator. Build context is the
  # repo root (its module replaces github.com/paylink/paylink-chain with ../../paylink-chain).
  # `--profile e2e`. Signs with the devnet adapter key whose pubkey is in the validator's
  # PROOF_VALIDATOR_TRUSTED_PUBKEYS, so its proofs verify and settle.
  mpesa-adapter:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: adapters/mpesa/Dockerfile
    environment:
      MPESA_ADAPTER_HTTP_ADDR: ":8082"
      MPESA_ADAPTER_REDIS_URL: redis://redis:6379/0
      MPESA_ADAPTER_PROOF_VALIDATOR_URL: http://proof-validator:8081
      MPESA_ADAPTER_DARAJA_SERVICE_URL: http://mpesa-daraja:8083
      MPESA_ADAPTER_INTERNAL_TOKEN: devnet-internal-token
      MPESA_ADAPTER_SIGNER_KEY: 3f7a1c0d9e8b6a5f4d3c2b1a09f8e7d6c5b4a3928170615243f5e6d7c8b9a0f1
      MPESA_ADAPTER_DEFAULT_SHORTCODE: "174379"
      MPESA_ADAPTER_LOG_LEVEL: info
      # work18 — OpenTelemetry: export spans to Tempo (no-op until OTEL_EXPORTER_OTLP_ENDPOINT set).
      OTEL_SERVICE_NAME: mpesa-adapter
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      proof-validator:
        condition: service_healthy
      mpesa-daraja:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/internal/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────────────────────────
  # work18 — local observability stack (Prometheus + Tempo + Grafana). Enable with
  # `--profile observability`. Metrics scraping works as soon as it is up. To ALSO export traces, set
  # OTEL_EXPORTER_OTLP_ENDPOINT so the services ship spans to Tempo (it is empty by default, so a
  # normal `docker compose up` runs telemetry as a no-op with no OTLP connection attempts):
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317 \
  #     docker compose --profile observability --profile e2e up -d
  # Then: Grafana http://localhost:3000 → Explore → Tempo (follow a trace); Prometheus
  # http://localhost:9091/targets (confirm every /metrics target is UP).
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090" # host 9091 (the lVM node owns 9090); targets/UI at http://localhost:9091
    restart: unless-stopped

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempodata:/var/tempo
    # OTLP receivers on 4317 (gRPC) / 4318 (HTTP); reached over the compose network as tempo:4317.
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

volumes:
  pgdata:
  chaindata:
  tempodata:
