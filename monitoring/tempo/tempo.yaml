# work18 — minimal single-binary Grafana Tempo for local trace storage. Receives OTLP from the
# services (telemetry-go / telemetry-python export to tempo:4317) and is queried by Grafana
# (tempo:3200). Local filesystem storage — ephemeral dev data, no retention guarantees.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

usage_report:
  reporting_enabled: false
